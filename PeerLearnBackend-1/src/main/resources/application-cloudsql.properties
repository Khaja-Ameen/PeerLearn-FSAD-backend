# Google Cloud SQL (MySQL) connection example
spring.datasource.url=jdbc:mysql:///<DB_NAME>?cloudSqlInstance=<INSTANCE_CONNECTION_NAME>&socketFactory=com.google.cloud.sql.mysql.SocketFactory&user=<USER>&password=<PASSWORD>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Replace <DB_NAME>, <INSTANCE_CONNECTION_NAME>, <USER>, <PASSWORD> with your actual values
